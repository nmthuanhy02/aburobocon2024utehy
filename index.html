<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Mobile Blog</title>

<style>
body, html {
  margin: 0;
  padding: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

/* Background */
#bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
 background: url("https://nmthuanhy02.github.io/aburobocon2024utehy/x5a1329-1715528379507865841722.jpg") no-repeat center;
  z-index: -2;
}

/* Overlay làm mờ 2 bên */
#bg-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: -1;

  background: radial-gradient(
    circle at center,
    rgba(0,0,0,0) 30%,
    rgba(0,0,0,0.4) 80%
  );

  transition: 0.3s;
}

/* Layout mobile */
.phone {
  max-width: 420px;
  margin: auto;
  position: relative;
  z-index: 2;
}

/* Header full màn hình */
.header {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  text-align: center;
}

/* Card */
.card {
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.08);
  border-radius: 20px;
  padding: 20px;
  margin: 20px;
}

/* Image */
img {
  width: 100%;
  border-radius: 15px;
}
</style>

</head>

<body>

<!-- BACKGROUND -->
<div id="bg"></div>
<div id="bg-overlay"></div>

<!-- CONTENT -->
<div class="phone">

  <div class="header">
    <h1>🌙 My Blog</h1>
    <p>Dark mode + Glass UI</p>
  </div>

  <div class="card">
    <h2>Bài viết 1</h2>
    <p>Nội dung ở đây...</p>
    <img src="https://picsum.photos/400/300">
  </div>

  <div class="card">
    <h2>Bài viết 2</h2>
    <p>Scroll xuống để thấy hiệu ứng...</p>
  </div>

</div>

<script>
window.addEventListener("scroll", function() {
  let scroll = window.scrollY;
  let max = window.innerHeight;

  let blur = scroll / 40;
  let dark = scroll / max;

  let bg = document.getElementById("bg");
  let overlay = document.getElementById("bg-overlay");

  bg.style.filter = "blur(" + blur + "px)";

  overlay.style.background = `
    radial-gradient(
      circle at center,
      rgba(0,0,0,0) 30%,
      rgba(0,0,0,${0.4 + dark}) 80%
    )
  `;
});
</script>

</body>
</html>
