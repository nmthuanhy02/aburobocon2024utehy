<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Mobile Blog</title>

<style>
body, html {
  margin: 0;
  padding: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

/* Background */
#bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: url("https://raw.githubusercontent.com/nmthuanhy02/aburobocon2024utehy/main/x5a1329-1715528379507865841722.jpg") no-repeat center;
  background-size: cover;
  z-index: -1;
  transition: 0.3s;
}

/* Fake phone frame */
.phone {
  max-width: 420px;
  margin: auto;
}

/* Header */
.header {
  text-align: center;
  padding: 100px 20px 40px;
}

/* Glass card */
.card {
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.08);
  border-radius: 20px;
  padding: 20px;
  margin: 15px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}

/* Button */
button {
  background: rgba(255,255,255,0.1);
  border: none;
  padding: 10px 20px;
  border-radius: 10px;
  color: white;
}

/* Image */
img {
  width: 100%;
  border-radius: 15px;
  margin-top: 10px;
}
</style>

</head>

<body>

<div id="bg"></div>

<div class="phone">

  <div class="header">
    <h1>🌙 My Blog</h1>
    <p>Dark mode + Glass UI</p>
  </div>

  <div class="card">
    <h2>Bài viết 1</h2>
    <p>Nội dung ở đây...</p>
    <img src="https://picsum.photos/400/300">
  </div>

  <div class="card">
    <h2>Bài viết 2</h2>
    <p>Scroll xuống để thấy hiệu ứng...</p>
  </div>

</div>

<script>
window.addEventListener("scroll", function() {
  let scroll = window.scrollY;
  let opacity = 1 - (scroll / window.innerHeight);
  if (opacity < 0) opacity = 0;

  let bg = document.getElementById("bg");
  bg.style.opacity = opacity;
  bg.style.filter = "blur(" + scroll/40 + "px)";
});
</script>

</body>
</html>
