<!DOCTYPE html>
<html>
<head>

<style>
html {
  scroll-behavior: smooth;
}

body, html {
  margin: 0;
  padding: 0;
  height: 250vh;
  font-family: Arial;
  color: orange; /* 👈 chữ màu cam */
}

/* MENU */
.menu {
  position: fixed;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  
  display: flex;
  gap: 8px;
  padding: 8px 12px;

  max-width: calc(100% - 20px); /* 👈 QUAN TRỌNG */
  overflow-x: auto;

  background: rgba(0,0,0,0.7);
  border-radius: 20px;

  z-index: 9999;

  -webkit-overflow-scrolling: touch; /* mượt mobile */
}

.menu a {
  flex: none;
  padding: 8px 14px;
  border-radius: 20px;
  background: rgba(255,165,0,0.2);
  color: orange;
  text-decoration: none;
  white-space: nowrap;
  transition: 0.3s;
}

.menu a:hover {
  background: orange;
  color: black;
}

/* Background */
#bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  background: url("https://raw.githubusercontent.com/nmthuanhy02/aburobocon2024utehy/main/480841794_647185004633403_3122103004893403758_n.jpg") no-repeat center;
  background-size: cover;
  background-position: center 70%;

  z-index: -1;
  transition: filter 0.2s;
}

/* PANEL */
#panel {
  position: absolute;
  top: 100vh;
  left: 50%;
  transform: translateX(-50%);

  width: 80%;
  min-height: 150vh;

  background: linear-gradient(
    180deg,
    rgba(0, 20, 40, 0.85),
    rgba(0, 10, 25, 0.95)
  );

  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 40px;

  opacity: 0;
  transition: opacity 0.5s;
}

/* SECTION */
.section {
  margin-bottom: 60px;
}

h2 {
  border-left: 4px solid orange;
  padding-left: 10px;
}

/* tránh bị menu che */
.anchor {
  scroll-margin-top: 70px;
}
.table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
  color: orange;
}
.table th, .table td {
  border: 1px solid rgba(255,165,0,0.3);
  padding: 10px;
  text-align: left;
}

.table th {
  background: rgba(255,165,0,0.2);
}

.table tr:hover {
  background: rgba(255,165,0,0.1);
}
  /* ===== MEMBERS ===== */
.members {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  border-radius: 15px;
  text-align: center;
  padding: 15px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 0 15px orange;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

.card h3 {
  color: orange;
  margin: 10px 0 5px;
}
  /* ===== CHỈ ĐẠO VIÊN ===== */
.leaders {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
  margin-bottom: 40px;
}

.leaders .card {
  background: linear-gradient(135deg, #001f3f, #003366);
}

/* TEAM 16 NGƯỜI */
.members {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
}

  /* ===== RESPONSIVE ===== */
@media (max-width: 900px) {
  .members {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (max-width: 500px) {
  .members {
    grid-template-columns: 1fr;
  }
}
  @media (max-width: 600px) {
  .menu {
    flex-wrap: nowrap;
    overflow-x: auto;
    white-space: nowrap;
  }

  .menu a {
    flex: none;
  }
}
  .modal {
  display: none;
  position: fixed;
  z-index: 9999;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  justify-content: center;
  align-items: center;
}

.modal img {
  max-width: 95%;
  max-height: 95%;
  border-radius: 10px;
  box-shadow: 0 0 20px black;
}
  /* ẢNH NỔI BẬT */
.highlight-img {
  text-align: center;
  margin-bottom: 20px;
}

.highlight-img img {
  width: 80%;
  max-width: 600px;
  border-radius: 15px;
  box-shadow: 0 0 20px rgba(255,165,0,0.5);
}

/* GALLERY ẢNH NHỎ */
.gallery {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
}

.gallery img {
  width: 180px;
  border-radius: 10px;
  transition: 0.3s;
}

.gallery img:hover {
  transform: scale(1.05);
}
</style>

  let scroll = window.scrollY;
  let max = window.innerHeight;

  let bg = document.getElementById("bg");
  let panel = document.getElementById("panel");

  // Blur background
  let blur = Math.min(scroll / 60, 12);
  bg.style.filter = "blur(" + blur + "px)";

  // Hiện panel
  if (scroll > max * 0.3) {
    panel.style.opacity = 1;
  } else {
    panel.style.opacity = 0;
  }
});
