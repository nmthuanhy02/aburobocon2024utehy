<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scroll Blur Effect</title>

<style>
html {
  scroll-behavior: smooth;
}

body, html {
  margin: 0;
  padding: 0;
  height: 250vh;
  font-family: Arial;
  color: orange; /* 👈 chữ màu cam */
}

/* MENU */
.menu {
  position: fixed;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  
  display: flex;
  gap: 10px;
  padding: 10px 20px;

  background: rgba(0,0,0,0.7);
  border-radius: 30px;
  backdrop-filter: blur(10px);

   z-index: 9999;
}

.menu a {
  flex: none;
  padding: 8px 14px;
  border-radius: 20px;
  background: rgba(255,165,0,0.2);
  color: orange;
  text-decoration: none;
  white-space: nowrap;
  transition: 0.3s;
}

.menu a:hover {
  background: orange;
  color: black;
}

/* Background */
#bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  background: url("https://raw.githubusercontent.com/nmthuanhy02/aburobocon2024utehy/main/480841794_647185004633403_3122103004893403758_n.jpg") no-repeat center;
  background-size: cover;
  background-position: center 70%;

  z-index: -1;
  transition: filter 0.2s;
}

/* PANEL */
#panel {
  position: absolute;
  top: 100vh;
  left: 50%;
  transform: translateX(-50%);

  width: 80%;
  min-height: 150vh;

  background: linear-gradient(
    180deg,
    rgba(0, 20, 40, 0.85),
    rgba(0, 10, 25, 0.95)
  );

  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 40px;

  opacity: 0;
  transition: opacity 0.5s;
}

/* SECTION */
.section {
  margin-bottom: 60px;
}

h2 {
  border-left: 4px solid orange;
  padding-left: 10px;
}

/* tránh bị menu che */
.anchor {
  scroll-margin-top: 70px;
}
.table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
  color: orange;
}
.table th, .table td {
  border: 1px solid rgba(255,165,0,0.3);
  padding: 10px;
  text-align: left;
}

.table th {
  background: rgba(255,165,0,0.2);
}

.table tr:hover {
  background: rgba(255,165,0,0.1);
}
</style>

</head>

<body>

<!-- MENU -->
<div class="menu">
  <a href="#gioithieu">Giới thiệu</a>
  <a href="#luatchoi">Luật chơi </a>
  <a href="#hanhtrinh">Hành trình</a>
  <a href="#thanhcong">Thành tích</a>
  <a href="#hientai">Thành viên</a>
</div>

<div id="bg"></div>

<!-- PANEL -->
<div id="panel">

  <div id="gioithieu" class="section anchor">
    <h2>Giới thiệu đội tuyển</h2>
    <p id="gioithieu-text"></p> 
  </div>
  
<div id="luat choi" class="section anchor">
    <h2>Đề tài và luật chơi</h2>
    <p id="luatchoi-content"></p> 
  </div>\
  
  <div id="hanhtrinh" class="section anchor">
    <h2>Quá trình biến giấc mơ thành hiện thực</h2>
    <p>Khâu ý tưởng, thử nghiệm...</p>
  </div>

  <div id="thanhcong" class="section anchor">
    <h2>Những nỗ lực thi đấu</h2>
    <p>Tham dự cuộc thi Sáng tạo Robot Việt Nam 2024...</p>
  </div>

  <div id="hientai" class="section anchor">
    <h2>Các thành viên hiện tại</h2>
    <p>Danh sách thành viên...</p>
  </div>

</div>

<script>
window.addEventListener("scroll", function() {
  let scroll = window.scrollY;
  let max = window.innerHeight;

  let bg = document.getElementById("bg");
  let panel = document.getElementById("panel");

  // Blur background
  let blur = Math.min(scroll / 60, 12);
  bg.style.filter = "blur(" + blur + "px)";

  // Hiện panel
  if (scroll > max * 0.3) {
    panel.style.opacity = 1;
  } else {
    panel.style.opacity = 0;
  }
});

`;

// ===== GÁN NỘI DUNG =====
document.getElementById("gioithieu-text").innerText = gioiThieuContent;
document.getElementById("luatchoi-content").innerHTML = luatChoiHTML;
</script>

</body>
</html>
