<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scroll Blur Effect</title>

<style>
html {
  scroll-behavior: smooth;
}

body, html {
  margin: 0;
  padding: 0;
  height: 250vh;
  font-family: Arial;
  color: orange; /* 👈 chữ màu cam */
}

/* MENU */
.menu {
  position: fixed;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  
  display: flex;
  gap: 10px;
  padding: 10px 20px;

  background: rgba(0,0,0,0.7);
  border-radius: 30px;
  backdrop-filter: blur(10px);

   z-index: 9999;
}

.menu a {
  flex: none;
  padding: 8px 14px;
  border-radius: 20px;
  background: rgba(255,165,0,0.2);
  color: orange;
  text-decoration: none;
  white-space: nowrap;
  transition: 0.3s;
}

.menu a:hover {
  background: orange;
  color: black;
}

/* Background */
#bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  background: url("https://raw.githubusercontent.com/nmthuanhy02/aburobocon2024utehy/main/480841794_647185004633403_3122103004893403758_n.jpg") no-repeat center;
  background-size: cover;
  background-position: center 70%;

  z-index: -1;
  transition: filter 0.2s;
}

/* PANEL */
#panel {
  position: absolute;
  top: 100vh;
  left: 50%;
  transform: translateX(-50%);

  width: 80%;
  min-height: 150vh;

  background: linear-gradient(
    180deg,
    rgba(0, 20, 40, 0.85),
    rgba(0, 10, 25, 0.95)
  );

  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 40px;

  opacity: 0;
  transition: opacity 0.5s;
}

/* SECTION */
.section {
  margin-bottom: 60px;
}

h2 {
  border-left: 4px solid orange;
  padding-left: 10px;
}

/* tránh bị menu che */
.anchor {
  scroll-margin-top: 70px;
}
.table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
  color: orange;
}
.table th, .table td {
  border: 1px solid rgba(255,165,0,0.3);
  padding: 10px;
  text-align: left;
}

.table th {
  background: rgba(255,165,0,0.2);
}

.table tr:hover {
  background: rgba(255,165,0,0.1);
}
</style>

</head>

<body>

<!-- MENU -->
<div class="menu">
  <a href="#gioithieu">Giới thiệu</a>
  <a href="#luatchoi">Luật chơi </a>
  <a href="#hanhtrinh">Hành trình</a>
  <a href="#thanhcong">Thành tích</a>
  <a href="#hientai">Thành viên</a>
</div>

<div id="bg"></div>

<!-- PANEL -->
<div id="panel">

  <div id="gioithieu" class="section anchor">
    <h2>Giới thiệu đội tuyển</h2>
    <p id="gioithieu-text"></p> 
  </div>
  
<div id="luat choi" class="section anchor">
    <h2>Đề tài và luật chơi</h2>
    <p id="luatchoi-content"></p> 
  </div>\
  
  <div id="thanhcong" class="section anchor">
  <h2>Những nỗ lực thi đấu</h2>
  <div id="thanhcong-content"></div>
</div>

  <div id="thanhcong" class="section anchor">
    <h2>Những nỗ lực thi đấu</h2>
    <p>Tham dự cuộc thi Sáng tạo Robot Việt Nam 2024...</p>
  </div>

  <div id="hientai" class="section anchor">
    <h2>Các thành viên hiện tại</h2>
    <p>Danh sách thành viên...</p>
  </div>

</div>

<script>
window.addEventListener("scroll", function() {
  let scroll = window.scrollY;
  let max = window.innerHeight;

  let bg = document.getElementById("bg");
  let panel = document.getElementById("panel");

  // Blur background
  let blur = Math.min(scroll / 60, 12);
  bg.style.filter = "blur(" + blur + "px)";

  // Hiện panel
  if (scroll > max * 0.3) {
    panel.style.opacity = 1;
  } else {
    panel.style.opacity = 0;
  }
});
// ===== NỘI DUNG CÓ THỂ SỬA Ở ĐÂY =====
const gioiThieuContent = `

`;
const luatChoiHTML = `
<h3>1. Chủ đề: "Ngày mùa" (Harvest Day)</h3>
<p>Lấy ý tưởng từ việc canh tác lúa trên các thửa ruộng bậc thang, tôn vinh nét văn hóa nông nghiệp của Việt Nam.</p>

<h3>2. Sân thi đấu và Robot</h3>
<ul>
  <li>Sân thi đấu: Chia làm 3 vùng (Gieo mạ - Thu hoạch - Silo)</li>
  <li>Đội hình:
    <ul>
      <li>Robot 1 (R1): Điều khiển hoặc tự động</li>
      <li>Robot 2 (R2): Tự động hoàn toàn</li>
    </ul>
  </li>
</ul>

<h3>3. Các giai đoạn và Cách tính điểm</h3>

<table class="table">
  <tr>
    <th>Giai đoạn</th>
    <th>Nhiệm vụ</th>
    <th>Điểm</th>
  </tr>
  <tr>
    <td>Giai đoạn 1</td>
    <td>Trồng mạ vào Vùng 1</td>
    <td>10 điểm / bó</td>
  </tr>
  <tr>
    <td>Giai đoạn 2</td>
    <td>Thu hoạch thóc</td>
    <td>10 điểm / lần</td>
  </tr>
  <tr>
    <td>Giai đoạn 3</td>
    <td>Ném thóc vào Silo</td>
    <td>30 điểm / hạt</td>
  </tr>
</table>

<p><b>Lưu ý:</b> Số thóc ≤ số bó mạ đã trồng.</p>

<h3>4. Chiến thắng "Mùa vàng"</h3>
<ul>
  <li>Ít nhất 3 Silo có thóc</li>
  <li>Các Silo phải đầy</li>
  <li>Thóc của đội nằm trên cùng</li>
</ul>

<p>⏱️ Thời gian: tối đa 3 phút. Nếu không có "Mùa vàng", đội nhiều điểm hơn thắng.</p>
`;
  const thanhCongHTML = `
<p><b>Ngày 4/5/2024</b>, Vòng loại Robocon toàn quốc chính thức khởi tranh, 64 đội tuyển trên cả nước tham gia. Các đội SKH xuất sắc chiếm 5 vị trí top đầu trong 32 đội vào chung kết.</p>

<p>Sau bốc thăm, SKH CK1 rơi vào bảng đấu khó, nhưng đã nhanh chóng khẳng định bản lĩnh bằng những chiến thắng thuyết phục để tiến vào vòng loại trực tiếp.</p>

<h3>Những cuộc đối đầu nghẹt thở</h3>

<p><b>Tại Tứ kết:</b> SKH CK1 đối đầu LH-VFLAME (ĐH Lạc Hồng). Trận "chung kết sớm" với những pha giằng co quyết liệt. SKH CK1 giành chiến thắng "Mùa vàng" ở giây 151.</p>

<p><b>Tại Bán kết:</b> Đối đầu SKH-TECH, trận đấu tốc độ cao. SKH CK1 tiếp tục chiến thắng với "Mùa vàng" ở giây 172.</p>

<h3>Trận Chung kết lịch sử: "Nội chiến" Hưng Yên</h3>

<p>Chung kết diễn ra tại Nhà thi đấu Tây Hồ (Hà Nội) giữa SKH CK1 và SKH AUTOMATION. Hai đội thi đấu phòng thủ chặt chẽ, liên tục ngăn cản nhau hoàn thành "Mùa vàng".</p>

<h3>Kết quả và Vinh quang</h3>

<p>SKH CK1 giành vị trí Á quân sau trận đấu sát nút. Tuy nhiên, đây là thành tích đủ để đội trở thành <b>Việt Nam 2</b>.</p>

<p>Đội đại diện Việt Nam tham dự <b>ABU Robocon 2024 tại Quảng Ninh</b>.</p>

<p>Hành trình này là biểu tượng cho tinh thần bền bỉ và sự thống trị của UTEHY trong mùa giải năm đó.</p>
`;
// ===== GÁN NỘI DUNG =====
document.getElementById("gioithieu-text").innerText = gioiThieuContent;
document.getElementById("luatchoi-content").innerHTML = luatChoiHTML;
  document.getElementById("thanhcong-content").innerHTML = thanhCongHTML;
</script>

</body>
</html>
