<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scroll Blur Effect</title>

<style>
body, html {
  margin: 0;
  padding: 0;
  height: 200vh; /* tạo scroll */
  font-family: Arial;
}

/* Ảnh nền */
#bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  background: url("https://raw.githubusercontent.com/nmthuanhy02/aburobocon2024utehy/main/480841794_647185004633403_3122103004893403758_n.jpg") no-repeat center;
  background-size: cover;

  /* 👇 CHỈNH Ở ĐÂY */
  background-position: center 70%;

  background-repeat: no-repeat;

  z-index: -1;
  transition: filter 0.2s;
}

/* Ảnh chính ở trên */
/* PANEL ĐEN-XANH */
#panel {
  position: absolute;
  top: 100vh; /* xuất hiện sau khi scroll */
  left: 50%;
  transform: translateX(-50%);

  width: 80%;
  min-height: 150vh;

  background: linear-gradient(
    180deg,
    rgba(0, 20, 40, 0.85),
    rgba(0, 10, 25, 0.95)
  );

  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 40px;

  opacity: 0;
  transition: opacity 0.5s;
}

/* Nội dung */
.content {
  font-size: 20px;
  line-height: 1.6;
}
</style>

</head>

<body>

<div id="bg"></div>

<!-- PANEL -->
<div id="panel">
  <div class="content">
    <h2>SKH CK1 ĐOÀN KÊT - TỰ TIN - CHIẾN THẮNG</h2>
    <p>Nội dung bắt đầu từ đây...</p>
    <p>Scroll tiếp để thấy panel kéo dài...</p>
    <p>Lorem ipsum dolor sit amet...</p>
    <p>Thêm nội dung...</p>
    <p>Thêm nội dung...</p>
    <p>Thêm nội dung...</p>
    <p>Thêm nội dung...</p>
  </div>
</div>

<script>
window.addEventListener("scroll", function() {
  let scroll = window.scrollY;
  let max = window.innerHeight;

  let bg = document.getElementById("bg");
  let panel = document.getElementById("panel");

  // Blur background
  let blur = Math.min(scroll / 60, 12);
  bg.style.filter = "blur(" + blur + "px)";

  // Khi scroll qua 30% màn hình → hiện panel
  if (scroll > max * 0.3) {
    panel.style.opacity = 1;
  } else {
    panel.style.opacity = 0;
  }
});
</script>

</body>
</html>

</body>
</html>
