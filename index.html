<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scroll Blur Effect</title>

<style>
body, html {
  margin: 0;
  padding: 0;
  height: 200vh; /* tạo scroll */
  font-family: Arial;
}

/* Ảnh nền */
#bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  background: url("https://raw.githubusercontent.com/nmthuanhy02/aburobocon2024utehy/main/480841794_647185004633403_3122103004893403758_n.jpg") no-repeat center;
  background-size: cover;

  z-index: -1;
  transition: filter 0.2s;
}

/* Ảnh chính ở trên */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.hero img {
  width: 90%;
  max-width: 500px;
  border-radius: 20px;
}

/* Nội dung dưới */
.content {
  padding: 40px;
  font-size: 20px;
}
</style>

</head>

<body>

<!-- Background -->
<div id="bg"></div>

<!-- Ảnh chính -->
<div class="hero">
  <img src="https://raw.githubusercontent.com/nmthuanhy02/aburobocon2024utehy/main/480841794_647185004633403_3122103004893403758_n.jpg">
</div>

<!-- Nội dung để scroll -->
<div class="content">
  <p>Scroll xuống để thấy hiệu ứng blur...</p>
  <p>Lorem ipsum dolor sit amet...</p>
  <p>Thêm nội dung cho dài...</p>
  <p>Thêm nội dung cho dài...</p>
  <p>Thêm nội dung cho dài...</p>
  <p>Thêm nội dung cho dài...</p>
</div>

<script>
window.addEventListener("scroll", function() {
  let scroll = window.scrollY;

  // blur tăng dần khi scroll
  let blur = Math.min(scroll / 50, 15);

  document.getElementById("bg").style.filter = "blur(" + blur + "px)";
});
</script>

</body>
</html>
