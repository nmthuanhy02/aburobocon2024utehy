<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scroll Blur Effect</title>

<style>
html {
  scroll-behavior: smooth;
}

body, html {
  margin: 0;
  padding: 0;
  height: 250vh;
  font-family: Arial;
  color: orange; /* 👈 chữ màu cam */
}

/* MENU */
.menu {
  position: fixed;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  
  display: flex;
  gap: 10px;
  padding: 10px 20px;

  background: rgba(0,0,0,0.7);
  border-radius: 30px;
  backdrop-filter: blur(10px);

   z-index: 9999;
}

.menu a {
  flex: none;
  padding: 8px 14px;
  border-radius: 20px;
  background: rgba(255,165,0,0.2);
  color: orange;
  text-decoration: none;
  white-space: nowrap;
  transition: 0.3s;
}

.menu a:hover {
  background: orange;
  color: black;
}

/* Background */
#bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  background: url("https://raw.githubusercontent.com/nmthuanhy02/aburobocon2024utehy/main/480841794_647185004633403_3122103004893403758_n.jpg") no-repeat center;
  background-size: cover;
  background-position: center 70%;

  z-index: -1;
  transition: filter 0.2s;
}

/* PANEL */
#panel {
  position: absolute;
  top: 100vh;
  left: 50%;
  transform: translateX(-50%);

  width: 80%;
  min-height: 150vh;

  background: linear-gradient(
    180deg,
    rgba(0, 20, 40, 0.85),
    rgba(0, 10, 25, 0.95)
  );

  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 40px;

  opacity: 0;
  transition: opacity 0.5s;
}

/* SECTION */
.section {
  margin-bottom: 60px;
}

h2 {
  border-left: 4px solid orange;
  padding-left: 10px;
}

/* tránh bị menu che */
.anchor {
  scroll-margin-top: 70px;
}
.table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
  color: orange;
}
.table th, .table td {
  border: 1px solid rgba(255,165,0,0.3);
  padding: 10px;
  text-align: left;
}

.table th {
  background: rgba(255,165,0,0.2);
}

.table tr:hover {
  background: rgba(255,165,0,0.1);
}
</style>

</head>

<body>

<!-- MENU -->
<div class="menu">
  <a href="#gioithieu">Giới thiệu</a>
  <a href="#luatchoi">Luật chơi </a>
  <a href="#hanhtrinh">Hành trình</a>
  <a href="#thanhcong">Thành tích</a>
  <a href="#hientai">Thành viên</a>
</div>

<div id="bg"></div>

<!-- PANEL -->
<div id="panel">

  <div id="gioithieu" class="section anchor">
    <h2>Giới thiệu đội tuyển</h2>
    <p id="gioithieu-text"></p> 
  </div>
  
<div id="luat choi" class="section anchor">
    <h2>Đề tài và luật chơi</h2>
    <p id="luatchoi-content"></p> 
  </div>\
  
  <div id="thanhcong" class="section anchor">
  <h2>Những nỗ lực thi đấu</h2>
  <div id="thanhcong-content"></div>
</div>

  <div id="thanhcong" class="section anchor">
    <h2>Những nỗ lực thi đấu</h2>
    <p>Tham dự cuộc thi Sáng tạo Robot Việt Nam 2024...</p>
  </div>

  <div id="hientai" class="section anchor">
    <h2>Các thành viên hiện tại</h2>
    <p>Danh sách thành viên...</p>
  </div>

</div>

<script>
window.addEventListener("scroll", function() {
  let scroll = window.scrollY;
  let max = window.innerHeight;

  let bg = document.getElementById("bg");
  let panel = document.getElementById("panel");

  // Blur background
  let blur = Math.min(scroll / 60, 12);
  bg.style.filter = "blur(" + blur + "px)";

  // Hiện panel
  if (scroll > max * 0.3) {
    panel.style.opacity = 1;
  } else {
    panel.style.opacity = 0;
  }
});
// ===== NỘI DUNG CÓ THỂ SỬA Ở ĐÂY =====
const gioiThieuContent = `
Đội tuyển SKH-CK1 chính thức được khai sinh vào cuối năm 2023, theo quyết định thành lập các đội hình nòng cốt tham dự Cuộc thi Sáng tạo Robot Việt Nam 2024 của trường ĐH SPKT Hưng Yên. Sánh bước cùng những người anh em SKH Tech, Automation, Phoenix và Asio, SKH-CK1 là sự hội tụ của 14 'chiến binh' ưu tú thuộc khóa 18 từ hai khoa Điện - Điện tử và Cơ khí. Dưới sự dẫn dắt của 'người thầy dày dạn trận mạc' – TS. Nguyễn Anh Tuấn, giảng viên khoa Cơ khí với hơn 20 năm kinh nghiệm chinh chiến, tập thể SKH-CK1 đã đồng lòng viết nên một trong những chương chói lọi nhất trong lịch sử Robocon của nhà trường.
`;
const luatChoiHTML = `
<h3>1. Chủ đề: "Ngày mùa" (Harvest Day)</h3>
<p>Lấy ý tưởng từ việc canh tác lúa trên các thửa ruộng bậc thang, tôn vinh nét văn hóa nông nghiệp của Việt Nam.</p>

<h3>2. Sân thi đấu và Robot</h3>
<ul>
  <li>Sân thi đấu: Chia làm 3 vùng (Gieo mạ - Thu hoạch - Silo)</li>
  <li>Đội hình:
    <ul>
      <li>Robot 1 (R1): Điều khiển hoặc tự động</li>
      <li>Robot 2 (R2): Tự động hoàn toàn</li>
    </ul>
  </li>
</ul>

<h3>3. Các giai đoạn và Cách tính điểm</h3>

<table class="table">
  <tr>
    <th>Giai đoạn</th>
    <th>Nhiệm vụ</th>
    <th>Điểm</th>
  </tr>
  <tr>
    <td>Giai đoạn 1</td>
    <td>Trồng mạ vào Vùng 1</td>
    <td>10 điểm / bó</td>
  </tr>
  <tr>
    <td>Giai đoạn 2</td>
    <td>Thu hoạch thóc</td>
    <td>10 điểm / lần</td>
  </tr>
  <tr>
    <td>Giai đoạn 3</td>
    <td>Ném thóc vào Silo</td>
    <td>30 điểm / hạt</td>
  </tr>
</table>

<p><b>Lưu ý:</b> Số thóc ≤ số bó mạ đã trồng.</p>

<h3>4. Chiến thắng "Mùa vàng"</h3>
<ul>
  <li>Ít nhất 3 Silo có thóc</li>
  <li>Các Silo phải đầy</li>
  <li>Thóc của đội nằm trên cùng</li>
</ul>

<p>⏱️ Thời gian: tối đa 3 phút. Nếu không có "Mùa vàng", đội nhiều điểm hơn thắng.</p>
`;
  const thanhCongHTML = `
<p><b>Ngày 4/5/2024</b>,  Vòng loại Robocon toàn quốc chính thức khởi tranh, 64 đội tuyển đến từ các trường đại học, cao đẳng khắp cả nước sẽ thi đấu độc lập để chọn ra 32 đội có thành tích tốt nhất tham dự vòng chung kết.</p>

<p>Trong thử thách lần này, các đội tuyển SKH đã dễ dàng vượt qua và xuất sắc chia sẻ cho nhau 5 vị trí top đầu trong số 32 đội thi tham gia. Sau những lá thăm chia bảng đầy ẩn số, SKH CK1 rơi vào một bảng đấu đòi hỏi sự tập trung cao độ. Tuy nhiên, với bản lĩnh của những "chiến binh" đến từ Đại học Sư phạm Kỹ thuật Hưng Yên, đội đã nhanh chóng khẳng định bản lĩnh bằng những chiến thắng thuyết phục để tiến thẳng vào vòng loại trực tiếp.
</p>

<h3>Những cuộc đối đầu nghẹt thở</h3>

</p>

<p><b>Tại Bán kết:</b> Đối đầu với "người anh em" cùng trường là SKH-TECH, SKH CK1 tiếp tục chứng tỏ sự ổn định kinh ngạc. Trận đấu diễn ra với tốc độ chóng mặt, và một lần nữa, SKH CK1 ghi tên mình vào trận đấu cuối cùng sau khi hoàn thành "Mùa vàng" ở giây thứ 172.

<h3>Trận Chung kết lịch sử: "Nội chiến" Hưng Yên</h3>

<p>Đêm chung kết toàn quốc diễn ra tại Nhà thi đấu Tây Hồ (Hà Nội) là một kịch bản không thể tin nổi khi cả hai đội bước vào sân đều mang màu cờ sắc áo của UTEHY: SKH CK1 và SKH AUTOMATION.
Vì quá hiểu lối chơi của nhau, trận đấu diễn ra theo thế trận phòng thủ cực kỳ chặt chẽ. Cả hai đội liên tục "đè" bóng, ngăn cản đối phương đặt hạt thóc ở vị trí trên cùng của silo để phá thế "Mùa vàng". Tiếng hò reo của cổ động viên như nổ tung nhà thi đấu khi từng giây trôi qua là một cuộc đấu trí căng thẳng về chiến thuật.
</p>

<h3>Kết quả và Vinh quang</h3>

<p>Dù cuối cùng SKH CK1 dừng chân ở vị trí Á quân đầy tiếc nuối khi thua sát nút về điểm số trước SKH AUTOMATION, nhưng vị trí này là quá đủ để hiện thực hóa giấc mơ lớn hơn.
Với thành tích này, SKH CK1 chính thức trở thành Việt Nam 2, cùng với nhà vô địch đồng hành đại diện cho quốc gia tiến ra đấu trường quốc tế: ABU Robocon 2024 tổ chức tại Quảng Ninh.
Hành trình của SKH CK1 tại Robocon 2024 không chỉ là câu chuyện về những con số hay kỹ thuật, mà là biểu tượng cho tinh thần bền bỉ và sự thống trị tuyệt đối của ngôi trường kỹ thuật mang tên Hưng Yên trong mùa giải năm ấy.
</b>.</p>
`;
// ===== GÁN NỘI DUNG =====
document.getElementById("gioithieu-text").innerText = gioiThieuContent;
document.getElementById("luatchoi-content").innerHTML = luatChoiHTML;
  document.getElementById("thanhcong-content").innerHTML = thanhCongHTML;
</script>
